<main id="main" class="section"><div class="container"><div class="heading"><span class="eyebrow">Nueva publicación</span><h1>Comparte un material</h1><p>Completa los datos; la vista previa se actualiza en tiempo real.</p></div><div class="form-layout"><form class="panel form-grid" id="publish-form"><div class="group full"><label for="title">Título</label><input class="control" id="title" maxlength="90" required placeholder="Ej. Cálculo de una variable"></div><div class="group"><label for="category">Categoría</label><select class="control" id="category" required><option value="">Selecciona</option><option>Libros</option><option>Electrónica</option><option>Instrumentos</option><option>Arte y Diseño</option><option>Mobiliario</option><option>Deporte</option><option>Uniformes</option><option>Otros</option></select></div><div class="group"><label for="state">Estado</label><select class="control" id="state" required><option value="">Selecciona</option><option>Nuevo</option><option>Como nuevo</option><option>Buen estado</option><option>Usado</option></select></div><div class="group full"><span style="font-weight:700">Modalidad</span><div class="types"><label><input type="radio" name="kind" value="venta" checked> Venta</label><label><input type="radio" name="kind" value="alquiler"> Alquiler</label><label><input type="radio" name="kind" value="intercambio"> Intercambio</label></div></div><div class="group"><label for="price">Precio en soles</label><input class="control" id="price" type="number" min="0" max="99999" required></div><div class="group"><label for="career-input">Carrera</label><input class="control" id="career-input" required></div><div class="group full"><label for="description">Descripción</label><textarea class="control" id="description" rows="4" minlength="15" maxlength="500" required></textarea></div><div class="group full"><label class="upload" for="photo">Foto del material (JPG, PNG o WebP, máx. 5 MB)<input id="photo" type="file" accept="image/jpeg,image/png,image/webp"><img id="preview-img" src="https://picsum.photos/seed/edumarket-nuevo/600/450" alt="" hidden></label></div><button class="btn primary full" type="submit">Publicar material</button></form><aside><h2>Vista previa</h2><div id="preview"></div></aside></div></div></main><footer class="footer"><div class="container"><a class="brand" href="index.html"><span class="mark">EM</span>EduMarket</a><small>© 2026 EduMarket · Proyecto académico</small></div></footer><script src="js/productos.js"></script><script src="js/app.js"></script></body></html>
